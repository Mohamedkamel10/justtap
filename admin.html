<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin">
<h2>إدارة البروفايل</h2>

<input id="username" placeholder="اسم المستخدم">
<input id="name" placeholder="الاسم الكامل">
<input id="job" placeholder="الوظيفة">

<label>صورة البروفايل</label>
<input type="file" id="avatar">

<label>صورة الغلاف</label>
<input type="file" id="cover">

<h3>Social Links</h3>

<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<input id="facebook" placeholder="Facebook URL">
<input id="instagram" placeholder="Instagram URL">
<input id="whatsapp" placeholder="WhatsApp Number">
<input id="tiktok" placeholder="TikTok URL">
<input id="snapchat" placeholder="Snapchat URL">


<button id="saveBtn">Save</button>

</div>

<script src="admin.js"></script>
</body>
</html>
