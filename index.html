<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  background:#f0f0f0;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  padding:40px;
}

.card{
  width:400px;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 10px 35px rgba(0,0,0,.15);
}

.cover{
  height:200px;
  background-size:cover;
  background-position:center;
}

.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  border:6px solid #fff;
  background-size:cover;
  background-position:center;
  margin:-65px auto 10px;
  box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.content{
  text-align:center;
  padding:20px 25px 30px;
}

#name{
  font-size:24px;
  font-weight:bold;
}

#job{
  color:#666;
  margin-top:5px;
}

.social{
  display:flex;
  justify-content:center;
  gap:22px;
  margin-top:25px;
}

.social a{
  font-size:28px;
  color:#000;
  transition:.2s;
}

.social a:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="card">
  <div class="cover" id="cover"></div>
  <div class="avatar" id="avatar"></div>

  <div class="content">
    <div id="name"></div>
    <div id="job"></div>

    <div class="social" id="socialLinks"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user");

const users = JSON.parse(localStorage.getItem("users") || "{}");
const user = users[username];

if (!user) {
  document.body.innerHTML = "<h2 style='text-align:center'>User not found</h2>";
} else {

  document.getElementById("name").textContent = user.name;
  document.getElementById("job").textContent = user.job;

  document.getElementById("avatar").style.backgroundImage =
    `url(${user.avatar})`;

  document.getElementById("cover").style.backgroundImage =
    `url(${user.cover})`;

  const box = document.getElementById("socialLinks");

  function add(icon, link){
    if(!link) return;
    const a = document.createElement("a");
    a.href = link;
    a.target="_blank";
    a.innerHTML = `<i class="fab fa-${icon}"></i>`;
    box.appendChild(a);
  }

  add("facebook", user.socials.facebook);
  add("instagram", user.socials.instagram);
  add("tiktok", user.socials.tiktok);
  add("snapchat", user.socials.snapchat);

  if(user.socials.whatsapp){
    add("whatsapp", "https://wa.me/" + user.socials.whatsapp);
  }
}
</script>

</body>
</html>
