<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  <script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user");

const users = JSON.parse(localStorage.getItem("users") || "{}");
const user = users[username];

if (!user) {
  document.body.innerHTML = "<h2 style='text-align:center'>User not found</h2>";
} else {

  document.getElementById("name").textContent = user.name;
  document.getElementById("job").textContent = user.job;

  document.getElementById("avatar").style.backgroundImage =
    `url(${user.avatar})`;

  document.getElementById("cover").style.backgroundImage =
    `url(${user.cover})`;

  const box = document.getElementById("socialLinks");

  function add(icon, link) {
    if (!link) return;
    const a = document.createElement("a");
    a.href = link;
    a.target = "_blank";
    a.innerHTML = `<i class="fab fa-${icon}"></i>`;
    box.appendChild(a);
  }

  add("facebook", user.socials.facebook);
  add("instagram", user.socials.instagram);
  add("tiktok", user.socials.tiktok);
  add("snapchat", user.socials.snapchat);

  if (user.socials.whatsapp) {
    add("whatsapp", "https://wa.me/" + user.socials.whatsapp);
  }
}
</script>

body{
  background:#eee;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:40px;
}
.card{
  width:400px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
.cover{
  height:180px;
  background-size:cover;
}
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:5px solid #fff;
  background-size:cover;
  margin:-60px auto 10px;
}
.content{
  text-align:center;
  padding:20px;
}
.social{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}
.social a{
  font-size:26px;
  color:black;
}
</style>
</head>

<body>

<div class="card">
  <div class="cover" id="cover"></div>
  <div class="avatar" id="avatar"></div>

  <div class="content">
    <h2 id="name"></h2>
    <p id="job"></p>

    <div class="social" id="socialLinks"></div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
